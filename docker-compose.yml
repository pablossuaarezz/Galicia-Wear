# JUSTIFICACIÓN: orquestación local con un solo comando. Cumple "compatibilidad Linux"
# de la rúbrica DAM. Usa solo paths relativos para que la raíz pueda tener espacios.
# La BBDD relacional (MySQL) es REMOTA (servidor del centro), por eso no aparece aquí —
# el backend se conecta directamente vía DATABASE_URL.
name: galiciawear

services:
  mongo:
    image: mongo:7
    container_name: galiciawear-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-galiciawear}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-galiciawear_dev}
      MONGO_INITDB_DATABASE: galiciawear
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: galiciawear-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # DATABASE_URL apunta al MySQL remoto del centro; el valor real se inyecta desde .env
      DATABASE_URL: ${DATABASE_URL}
      MONGO_URL: mongodb://${MONGO_USER:-galiciawear}:${MONGO_PASSWORD:-galiciawear_dev}@mongo:27017/galiciawear?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-please-override-in-production-min-16}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-please-override-too-min-16-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"

  web:
    build: ./web
    container_name: galiciawear-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
