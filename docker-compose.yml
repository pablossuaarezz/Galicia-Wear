# JUSTIFICACIÓN: orquestación local con un solo comando. Cumple "compatibilidad Linux"
# de la rúbrica DAM. Usa solo paths relativos para que la raíz pueda tener espacios.
name: galiciawear

services:
  postgres:
    image: postgres:16-alpine
    container_name: galiciawear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-galiciawear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galiciawear_dev}
      POSTGRES_DB: ${POSTGRES_DB:-galiciawear}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-galiciawear}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: galiciawear-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-galiciawear}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-galiciawear_dev}
      MONGO_INITDB_DATABASE: galiciawear
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: galiciawear-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-galiciawear}:${POSTGRES_PASSWORD:-galiciawear_dev}@postgres:5432/${POSTGRES_DB:-galiciawear}?schema=public
      MONGO_URL: mongodb://${MONGO_USER:-galiciawear}:${MONGO_PASSWORD:-galiciawear_dev}@mongo:27017/galiciawear?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-please-override-in-production-min-16}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-please-override-too-min-16-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"

  web:
    build: ./web
    container_name: galiciawear-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  mongo_data:
