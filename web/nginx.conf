# JUSTIFICACIÓN: SPA fallback (todas las rutas no-archivo van a index.html).
# Proxy /api → backend para mantener mismo origen en producción.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache agresiva para assets con hash
  location ~* \.(js|css|woff2|svg|png|jpg|jpeg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fotos de prenda subidas → backend. `^~` evita que la regex de assets de arriba (\.jpg$)
  # capture estas rutas y las intente servir como archivo estático local (daría 404).
  location ^~ /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Socket.IO (chat en tiempo real) → backend, con upgrade a WebSocket.
  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # API → backend en la red interna de Docker
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
